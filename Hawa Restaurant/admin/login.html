<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Hawa Restaurant</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
    :root {
      --bg-dark: #070707;
      --bg-alt: #111111;
      --gold: #c5a880;
      --gold-accent: #e5c59e;
      --text: #fafaf9;
      --text-muted: #a8a29e;
      --border-gold: rgba(197,168,128,0.15);
      --glass: rgba(15,15,15,0.75);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #0f0f0f 0%, #070707 70%);
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .login-card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-gold);
      border-radius: 16px;
      padding: 48px 36px;
      text-align: center;
    }
    .login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--gold-accent), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 36px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
    .login-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid rgba(197,168,128,0.3);
      background: rgba(197,168,128,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 24px;
      color: var(--gold);
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-gold);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(197,168,128,0.1);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold), #b8946a);
      border: none;
      border-radius: 8px;
      color: #070707;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }
    .btn-login:hover {
      background: linear-gradient(135deg, var(--gold-accent), var(--gold));
      box-shadow: 0 4px 20px rgba(197,168,128,0.3);
    }
    .error-msg {
      color: #ef4444;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-icon"><i class="fas fa-shield-halved"></i></div>
      <h1 class="login-logo">HAWA</h1>
      <p class="login-subtitle">Operator Portal</p>
      <form id="login-form">
        <div class="form-group">
          <label>Admin Password</label>
          <input type="password" id="password" placeholder="Enter admin password" required autofocus>
        </div>
        <button type="submit" class="btn-login"><i class="fas fa-lock-open"></i> Access Dashboard</button>
        <p class="error-msg" id="login-error">Invalid password. Try again.</p>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      errorEl.classList.remove('show');

      try {
        const res = await fetch(`${API_BASE}/api/admin_auth`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();

        if (data.success) {
          sessionStorage.setItem('hawa_admin', 'authenticated');
          window.location.href = 'dashboard.html';
        } else {
          errorEl.classList.add('show');
        }
      } catch (err) {
        errorEl.textContent = 'Connection error. Check API status.';
        errorEl.classList.add('show');
      }
    });

    // Redirect if already logged in
    if (sessionStorage.getItem('hawa_admin') === 'authenticated') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
