<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Display | Hawa Restaurant</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fafaf9; font-family: 'Inter', sans-serif; min-height: 100vh; }
    .topbar { background: #111; border-bottom: 2px solid #c5a880; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .topbar h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.05em; }
    .topbar h1 span { color: #c5a880; }
    .topbar-right { display: flex; align-items: center; gap: 16px; font-size: 14px; color: #a8a29e; }
    .live-dot { width: 10px; height: 10px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.4); } 50% { box-shadow: 0 0 0 10px rgba(74,222,128,0); } }
    .sound-toggle { background: none; border: 1px solid #333; color: #a8a29e; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .sound-toggle:hover { border-color: #c5a880; color: #c5a880; }
    .sound-toggle.on { border-color: #4ade80; color: #4ade80; }
    .stats-bar { display: flex; gap: 12px; padding: 16px 24px; background: #0d0d0d; border-bottom: 1px solid #1a1a1a; }
    .stat-box { flex: 1; background: #111; border: 1px solid #1a1a1a; border-radius: 8px; padding: 12px; text-align: center; }
    .stat-box .num { font-size: 28px; font-weight: 800; }
    .stat-box .num.gold { color: #c5a880; }
    .stat-box .num.green { color: #4ade80; }
    .stat-box .num.red { color: #ef4444; }
    .stat-box .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #a8a29e; margin-top: 4px; }
    .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; padding: 24px; }
    .order-tile { background: #111; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px; transition: all 0.3s; }
    .order-tile.new { border-left: 4px solid #60a5fa; }
    .order-tile.confirmed { border-left: 4px solid #4ade80; }
    .order-tile.preparing { border-left: 4px solid #facc15; }
    .order-tile.ready { border-left: 4px solid #4ade80; opacity: 0.6; }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .order-id { font-size: 14px; font-weight: 700; color: #c5a880; }
    .order-time { font-size: 11px; color: #facc15; }
    .order-time.old { color: #ef4444; animation: none; }
    .order-items { margin-bottom: 16px; }
    .order-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
    .order-item:last-child { border-bottom: none; }
    .item-qty { background: #c5a880; color: #0a0a0a; font-weight: 800; font-size: 14px; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .item-name { flex: 1; font-size: 14px; font-weight: 600; }
    .order-type-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .type-dinein { background: rgba(197,168,128,0.15); color: #c5a880; }
    .type-takeaway { background: rgba(96,165,250,0.15); color: #60a5fa; }
    .type-delivery { background: rgba(74,222,128,0.15); color: #4ade80; }
    .order-notes { font-size: 11px; color: #a8a29e; background: #0a0a0a; padding: 8px; border-radius: 6px; margin-bottom: 12px; }
    .order-actions { display: flex; gap: 8px; }
    .btn-kitchen { flex: 1; padding: 10px; border: 1px solid #1a1a1a; background: transparent; color: #a8a29e; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.3s; }
    .btn-accept { border-color: rgba(74,222,128,0.4); color: #4ade80; }
    .btn-accept:hover { background: rgba(74,222,128,0.1); border-color: #4ade80; }
    .btn-ready { border-color: rgba(197,168,128,0.4); color: #c5a880; }
    .btn-ready:hover { background: rgba(197,168,128,0.1); border-color: #c5a880; }
    .btn-reject { border-color: rgba(239,68,68,0.3); color: #ef4444; }
    .btn-reject:hover { background: rgba(239,68,68,0.1); }
    .empty-state { text-align: center; padding: 80px 20px; color: #a8a29e; }
    .empty-state i { font-size: 56px; color: #1a1a1a; margin-bottom: 16px; }
    .empty-state p { font-size: 18px; }
    .noise-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8"/></filter><rect width="300" height="300" filter="url(%23n)" opacity="0.015"/></svg>'); pointer-events: none; z-index: 999; }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>

  <div class="topbar">
    <h1>HAWA <span>Kitchen</span></h1>
    <div class="topbar-right">
      <span class="live-dot"></span> Live · <span id="clock">--:--</span>
      <button class="sound-toggle off" id="sound-btn" onclick="toggleSound()">🔇 Sound OFF</button>
      <span style="font-size:11px;" id="last-update">--</span>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="orders-grid" id="orders-grid">
    <div class="empty-state"><i class="fas fa-inbox"></i><p>Loading orders...</p></div>
  </div>

  <script>
    const API = window.location.origin;
    const PASSWORD = 'Hawa@Admin2026';
    let soundEnabled = false;
    let previousCount = 0;

    function toggleSound() {
      soundEnabled = !soundEnabled;
      const btn = document.getElementById('sound-btn');
      btn.textContent = soundEnabled ? '🔊 Sound ON' : '🔇 Sound OFF';
      btn.className = 'sound-toggle ' + (soundEnabled ? 'on' : 'off');
    }

    function playBeep() {
      if (!soundEnabled) return;
      try { const ctx = new (window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(); o.type='square'; o.frequency.value=800; const g=ctx.createGain(); g.gain.value=0.1; o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+0.15); } catch(e){}
    }

    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);

    async function loadOrders() {
      try {
        const res = await fetch(`${API}/api/orders?limit=50`);
        const data = await res.json();
        const orders = (data.orders || []).filter(o => o.status !== 'delivered' && o.status !== 'cancelled');
        
        // Play sound on new order
        if (orders.length > previousCount) playBeep();
        previousCount = orders.length;

        // Stats
        const n = orders.filter(o => o.status==='new').length;
        const c = orders.filter(o => o.status==='confirmed').length;
        const p = orders.filter(o => o.status==='preparing').length;
        document.getElementById('stats-bar').innerHTML = `
          <div class="stat-box"><div class="num gold">${orders.length}</div><div class="lbl">Active</div></div>
          <div class="stat-box"><div class="num red">${n}</div><div class="lbl">New Orders</div></div>
          <div class="stat-box"><div class="num green">${c}</div><div class="lbl">Confirmed</div></div>
          <div class="stat-box"><div class="num gold">${p}</div><div class="lbl">Preparing</div></div>
        `;

        if (!orders.length) {
          document.getElementById('orders-grid').innerHTML = '<div class="empty-state"><i class="fas fa-check-circle"></i><p>All caught up! No pending orders.</p></div>';
          document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
          return;
        }

        document.getElementById('orders-grid').innerHTML = orders.map(o => {
          const mins = Math.floor((Date.now() - new Date(o.createdAt)) / 60000);
          const timeClass = mins > 20 ? 'old' : '';
          const items = (o.items||[]).map(i => `
            <div class="order-item">
              <div class="item-qty">${i.qty||1}</div>
              <div class="item-name">${i.name}</div>
            </div>`).join('');

          let actions = '';
          if (o.status === 'new') actions = `<button class="btn-kitchen btn-accept" onclick="updateStatus('${o.id}','confirmed')"><i class="fas fa-check"></i> Accept</button><button class="btn-kitchen btn-reject" onclick="updateStatus('${o.id}','cancelled')"><i class="fas fa-times"></i></button>`;
          else if (o.status === 'confirmed') actions = `<button class="btn-kitchen btn-ready" onclick="updateStatus('${o.id}','preparing')"><i class="fas fa-fire"></i> Start Preparing</button>`;
          else if (o.status === 'preparing') actions = `<button class="btn-kitchen btn-accept" onclick="updateStatus('${o.id}','ready')"><i class="fas fa-bell"></i> Mark Ready</button>`;

          return `<div class="order-tile ${o.status}">
            <div class="order-type-badge type-${(o.orderType||'dinein').toLowerCase()}">${o.orderType||'Dine-in'}</div>
            <div class="order-header">
              <span class="order-id">#${o.id}</span>
              <span class="order-time ${timeClass}">⏱ ${mins}m ago</span>
            </div>
            <div class="order-items">${items}</div>
            ${o.notes ? `<div class="order-notes">📝 ${o.notes}</div>` : ''}
            <div class="order-actions">${actions}</div>
          </div>`;
        }).join('');

        document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
      } catch(e) { document.getElementById('last-update').textContent = 'Error'; }
    }

    async function updateStatus(orderId, status) {
      try {
        await fetch(`${API}/api/order_status`, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({orderId, status, password: PASSWORD, source: 'kitchen'})
        });
        loadOrders();
      } catch(e) {}
    }

    loadOrders();
    setInterval(loadOrders, 5000);
  </script>
</body>
</html>
