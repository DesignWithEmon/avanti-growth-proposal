<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Stylized Kite Logo -->
  <g transform="translate(50, 45)">
    <!-- Top Left (Green) -->
    <path d="M 0,0 L -30,-15 C -25,-30 -10,-35 0,-35 Z" fill="#2eb872" />
    <!-- Top Right (Blue) -->
    <path d="M 0,0 L 30,-15 C 25,-30 10,-35 0,-35 Z" fill="#0074e4" />
    <!-- Bottom Left (Magenta) -->
    <path d="M 0,0 L -30,-15 C -25,10 -10,20 0,20 Z" fill="#f3425f" />
    <!-- Bottom Right (Orange) -->
    <path d="M 0,0 L 30,-15 C 25,10 10,20 0,20 Z" fill="#f7b928" />
    <!-- Tail (Yellow/Orange) -->
    <path d="M 0,20 L -8,35 L 8,35 Z" fill="#f7b928" />
    <!-- Kite Crosslines -->
    <path d="M 0,-35 L 0,20 M -30,-15 L 30,-15" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6" />
  </g>
</svg>